<!DOCTYPE html>
<html>
<head>
    <title>View Books</title>
</head>
<body>

<h2>Library Books</h2>

<table border="1">
    <tr>
        <th>Book ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Quantity</th>
    </tr>

    {% for book in books %}
    <tr>
        <td>{{ book[0] }}</td>
        <td>{{ book[1] }}</td>
        <td>{{ book[2] }}</td>
        <td>{{ book[3] }}</td>
    </tr>
    {% endfor %}

</table>

<br>

<a href="/">Back to Home</a>

</body>
</html>
